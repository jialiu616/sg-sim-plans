name: Plan Status Update

on:
  push:
    branches: [main]
    paths: ['src/data/plans.ts']
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  update-plans:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run plan update script
        run: node scripts/update-plans.mjs --apply

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet src/data/plans.ts scripts/plans-snapshot.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore: weekly plan data update'
          title: 'Weekly Plan Data Update'
          body: |
            Automated weekly update of SG SIM plan data.

            This PR was generated by the `update-plans` script.
            Please review the changes to `src/data/plans.ts` before merging.

            - New plans will show a **NEW** badge for 30 days
            - Updated plans will show an **UPD** badge for 30 days
          branch: auto/weekly-plan-update
          delete-branch: true
          labels: automated,plans-update
